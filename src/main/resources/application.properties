# 应用服务 WEB 访问端口
server.port=8080

# Tomcat 线程池（支持30人并发）
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=100
server.tomcat.accept-count=20

# 数据库连接信息
spring.datasource.url=jdbc:mysql://localhost:3306/snowisland?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.username=root
spring.datasource.password=695390489
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池（支持30人并发）
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=600000

# JPA配置
spring.jpa.hibernate.ddl-auto=update
# 启用 Hibernate SQL 日志（需要调试时再设为 true）
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 需要时在日志级别单独打开 SQL（推荐不要用 println）
# logging.level.org.hibernate.SQL=DEBUG

